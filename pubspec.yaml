name: pslab
description: "PSLab app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.4
  flutter: '3.44.4'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  cupertino_icons: ^1.0.9
  flutter_svg: ^2.3.0
  google_fonts: ^8.1.0
  fl_chart: ^1.2.0
  provider: ^6.1.5
  usb_serial:
    git:
      url: https://github.com/marcnause/usbserial.git
      ref: master
  get_it: ^9.2.1
  record: ^7.1.0
  data: ^0.15.1
  logger: ^2.7.0
  url_launcher: ^6.3.2
  font_awesome_flutter: ^11.0.0
  package_info_plus: ^10.2.0
  sensors_plus: ^7.1.0
  sleek_circular_slider: ^2.1.0
  gauge_indicator: ^0.6.0
  light: ^5.0.0
  connectivity_plus: ^7.1.1
  carousel_slider: ^5.1.1
  vibration: ^3.2.0
  shared_preferences: ^2.5.5
  csv: ^8.0.0
  share_plus: ^13.1.0
  path_provider: ^2.1.6
  file_picker: ^12.0.0-beta.7
  flutter_screenutil: ^5.9.3
  flusbserial: ^0.6.0
  inno_bundle: ^0.11.2
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  geolocator: ^14.0.3
  wakelock_plus: ^1.6.1
  image: ^4.9.1
  serial: ^0.0.7+1
  web: ^1.1.1
  mp_audio_stream: ^0.2.2
  ffi: ^2.2.0
  home_widget: ^0.9.2
  girix_code_gauge: ^0.0.6
dev_dependencies:
  flutter_launcher_icons: ^0.14.1
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_oss_licenses: ^3.2.0

flutter:
  generate: true

  fonts:
    - family: Digital-7
      fonts:
        - asset: fonts/Digital-7.ttf
        - asset: fonts/Digital-7-Italic.ttf
          style: italic

  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/

inno_bundle:
  id: b633ddbf-a022-4cbb-a459-4ba9fec0da51
  name: PSLab
  publisher: FOSSASIA
  url: https://pslab.io
  support_url: https://github.com/fossasia/pslab-app/issues
  updates_url: https://github.com/fossasia/pslab-app/releases

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icons/icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/icon.png"
  adaptive_icon_monochrome: "assets/icons/icon.png"
  adaptive_icon_foreground_inset: 22

  web:
    generate: true
    image_path: "assets/icons/icon.png"
    background_color: "#FFFFFF"
    theme_color: "#0175C2"

  windows:
    generate: true
    image_path: "assets/icons/icon.png"
    icon_size: 48

  macos:
    generate: true
    image_path: "assets/icons/icon.png"