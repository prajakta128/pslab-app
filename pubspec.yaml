name: pslab
description: "PSLab app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.4
  flutter: '3.41.7'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  cupertino_icons: ^1.0.9
  flutter_svg: ^2.2.4
  google_fonts: ^8.0.2
  fl_chart: ^1.2.0
  provider: ^6.1.5
  usb_serial:
    git:
      url: https://github.com/marcnause/usbserial.git
      ref: master
  get_it: ^9.2.1
  record: ^6.2.0
  data: ^0.15.1
  permission_handler: ^12.0.1
  logger: ^2.7.0
  url_launcher: ^6.3.2
  font_awesome_flutter: ^10.10.0
  package_info_plus: ^9.0.1
  sensors_plus: ^7.0.0
  sleek_circular_slider: ^2.1.0
  gauge_indicator: ^0.4.3
  light: ^4.1.0
  connectivity_plus: ^7.0.0
  carousel_slider: ^5.1.1
  vibration: ^3.1.8
  shared_preferences: ^2.5.5
  csv: ^8.0.0
  share_plus: ^12.0.0
  path_provider: ^2.1.5
  file_picker: ^10.3.2
  flutter_screenutil: ^5.9.3
  flusbserial: ^0.4.0
  inno_bundle: ^0.11.2
  flutter_map: ^8.2.1
  latlong2: ^0.9.1
  geolocator: ^14.0.2
  wakelock_plus: ^1.5.2
  image: ^4.1.3
  serial: ^0.0.7+1
  web: ^1.1.1
  mp_audio_stream: ^0.2.2
  ffi: ^2.2.0

dev_dependencies:
  flutter_launcher_icons: ^0.14.1
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_oss_licenses: ^3.0.4

flutter:
  generate: true

  fonts:
    - family: Digital-7
      fonts:
        - asset: fonts/Digital-7.ttf
        - asset: fonts/Digital-7-Italic.ttf
          style: italic

  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/

inno_bundle:
  id: b633ddbf-a022-4cbb-a459-4ba9fec0da51
  name: PSLab
  publisher: FOSSASIA
  url: https://pslab.io
  support_url: https://github.com/fossasia/pslab-app/issues
  updates_url: https://github.com/fossasia/pslab-app/releases

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icons/icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/icon.png"
  adaptive_icon_monochrome: "assets/icons/icon.png"
  adaptive_icon_foreground_inset: 22

  web:
    generate: true
    image_path: "assets/icons/icon.png"
    background_color: "#FFFFFF"
    theme_color: "#0175C2"

  windows:
    generate: true
    image_path: "assets/icons/icon.png"
    icon_size: 48

  macos:
    generate: true
    image_path: "assets/icons/icon.png"